services:
  # Backend API
  - type: web
    name: ricexport-backend
    env: python
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn ricexport.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: ricexport-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ricexport-frontend.onrender.com,http://localhost:5173

databases:
  - name: ricexport-db
    databaseName: ricexport
    user: ricexport
    region: oregon
